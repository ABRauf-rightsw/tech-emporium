<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Tech Emporium</title>
  <!-- Bootstrap 5 & Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/admin-style.css">
</head>
<body>

  <!-- Page Loader -->
  <div id="loader-wrapper">
    <div class="loader-spinner"></div>
  </div>

  <div class="login-bg">
    <div class="login-glass-card text-center text-white">
      <!-- Logo -->
      <div class="mb-4">
        <i class="bi bi-cpu text-primary" style="font-size: 3rem; filter: drop-shadow(0 0 10px rgba(37,99,235,0.5));"></i>
        <h4 class="mt-2 fw-bold text-uppercase" style="letter-spacing: 1.5px;">
          Tech <span class="text-primary">Emporium</span>
        </h4>
        <p class="text-muted-white small text-white-50">Admin Management Portal</p>
      </div>

      <form id="loginForm" class="text-start">
        <div class="mb-3">
          <label for="email" class="form-label small text-white-50">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-white-50 border-secondary-subtle">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" id="email" class="form-control border-start-0 border-secondary-subtle text-white" placeholder="admin@techemporium.com.pk" required value="admin@techemporium.com.pk">
          </div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between">
            <label for="password" class="form-label small text-white-50">Password</label>
            <a href="#" class="small text-primary text-decoration-none" onclick="alert('Password reset link simulated and sent to email.')">Forgot?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-white-50 border-secondary-subtle">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" id="password" class="form-control border-start-0 border-secondary-subtle text-white" placeholder="••••••••" required value="admin123">
          </div>
        </div>

        <div class="mb-4 form-check text-start">
          <input type="checkbox" class="form-check-input bg-transparent border-secondary-subtle" id="rememberMe" checked>
          <label class="form-check-label small text-white-50" for="rememberMe">Remember me on this machine</label>
        </div>

        <button type="submit" class="btn btn-custom-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In to Dashboard
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/admin.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const loader = document.getElementById("loader-wrapper");
      loader.style.opacity = "1";
      loader.style.visibility = "visible";
      
      setTimeout(function() {
        window.location.href = "dashboard.html";
      }, 600);
    });
  </script>
</body>
</html>
