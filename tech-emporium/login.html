<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Tech Emporium</title>
  <meta name="description" content="Access your Tech Emporium customer account to view past orders, shipping details, and track shipments.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Page Loader -->
  <div id="loader-wrapper">
    <div class="loader-spinner"></div>
  </div>

  <!-- Sticky Navbar Header -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-white" href="index.html">
          <i class="bi bi-cpu text-electric" style="font-size: 1.8rem;"></i>
          <span>TECH <span class="text-electric">EMPORIUM</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Shop Catalog</a></li>
            <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Login Section -->
  <main style="margin-top: 100px;" class="flex-grow-1 d-flex align-items-center mb-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          
          <div class="card glass-card p-4 border border-secondary shadow-lg">
            <div class="text-center mb-4">
              <i class="bi bi-cpu text-electric" style="font-size: 3rem;"></i>
              <h2 class="text-white mt-2 mb-1">Welcome Back</h2>
              <p class="text-muted small">Sign in to manage your premium orders</p>
            </div>
            
            <form onsubmit="event.preventDefault(); CartManager.showAlert('Successfully Logged In!', 'success'); setTimeout(() => { window.location.href = 'my-account.html'; }, 1500);">
              <!-- Email Address -->
              <div class="mb-3">
                <label for="login-email" class="form-label text-muted small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control custom-input" id="login-email" placeholder="example@email.com" required value="ali.tech@gmail.com">
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <label for="login-password" class="form-label text-muted small mb-0">Password</label>
                  <a href="#" onclick="event.preventDefault(); alert('Demo: Password reset instructions sent to your email.')" class="text-electric small" style="font-size:0.75rem;">Forgot Password?</a>
                </div>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control custom-input" id="login-password" placeholder="••••••••" required value="ali12345">
                </div>
              </div>

              <!-- Remember Me -->
              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember-me" checked>
                <label class="form-check-label text-white small" for="remember-me">
                  Remember my session on this device
                </label>
              </div>

              <!-- Login Buttons -->
              <button type="submit" class="btn btn-electric w-100 py-2 mb-3 text-uppercase fw-bold">
                Log In
              </button>
              
              <a href="products.html" class="btn btn-outline-light w-100 py-2 text-uppercase fw-bold rounded-pill mb-3">
                Continue Shopping
              </a>
            </form>

            <div class="text-center mt-3 border-top border-secondary pt-3">
              <span class="text-muted small">Don't have an account? </span>
              <a href="register.html" class="text-electric small fw-bold">Create Account</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- Footer Section -->
  <footer class="pt-4 pb-3 mt-auto">
    <div class="container text-center">
      <p class="small text-muted mb-0">&copy; 2026 Tech Emporium. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
