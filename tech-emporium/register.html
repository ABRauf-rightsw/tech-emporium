<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Account | Tech Emporium</title>
  <meta name="description" content="Sign up for a free Tech Emporium customer account to track orders, save billing locations, and compile wishlists.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Page Loader -->
  <div id="loader-wrapper">
    <div class="loader-spinner"></div>
  </div>

  <!-- Sticky Navbar Header -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-white" href="index.html">
          <i class="bi bi-cpu text-electric" style="font-size: 1.8rem;"></i>
          <span>TECH <span class="text-electric">EMPORIUM</span></span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Shop Catalog</a></li>
            <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Register Section -->
  <main style="margin-top: 100px;" class="flex-grow-1 d-flex align-items-center mb-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          
          <div class="card glass-card p-4 border border-secondary shadow-lg">
            <div class="text-center mb-4">
              <i class="bi bi-person-plus text-electric" style="font-size: 3rem;"></i>
              <h2 class="text-white mt-2 mb-1">Create Account</h2>
              <p class="text-muted small">Sign up to get fast secure delivery services in PKR</p>
            </div>
            
            <form onsubmit="event.preventDefault(); 
                            const p1 = document.getElementById('reg-pass').value; 
                            const p2 = document.getElementById('reg-confirm').value; 
                            if(p1 !== p2){ alert('Passwords do not match!'); return; }
                            CartManager.showAlert('Account Registered Successfully!', 'success'); 
                            setTimeout(() => { window.location.href = 'login.html'; }, 1500);">
              
              <!-- Full Name -->
              <div class="mb-3">
                <label for="reg-name" class="form-label text-muted small">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control custom-input" id="reg-name" placeholder="First and last name" required>
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="reg-email" class="form-label text-muted small">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control custom-input" id="reg-email" placeholder="example@email.com" required>
                </div>
              </div>

              <!-- Phone -->
              <div class="mb-3">
                <label for="reg-phone" class="form-label text-muted small">Phone Number</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-telephone"></i></span>
                  <input type="text" class="form-control custom-input" id="reg-phone" placeholder="e.g. 0300-1234567" required>
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="reg-pass" class="form-label text-muted small">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control custom-input" id="reg-pass" placeholder="Minimum 6 characters" required minlength="6">
                </div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-4">
                <label for="reg-confirm" class="form-label text-muted small">Confirm Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control custom-input" id="reg-confirm" placeholder="Re-type password" required>
                </div>
              </div>

              <button type="submit" class="btn btn-electric w-100 py-2 mb-3 text-uppercase fw-bold">
                Register Account
              </button>
            </form>

            <div class="text-center mt-3 border-top border-secondary pt-3">
              <span class="text-muted small">Already have an account? </span>
              <a href="login.html" class="text-electric small fw-bold">Log In</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- Footer Section -->
  <footer class="pt-4 pb-3 mt-auto">
    <div class="container text-center">
      <p class="small text-muted mb-0">&copy; 2026 Tech Emporium. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
